name: ClearHalal
options:
  bundleIdPrefix: com.utkarshkaushik
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    DEVELOPMENT_TEAM: T932Z73585
    CODE_SIGN_STYLE: Automatic

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.0.0

targets:
  ClearHalal:
    type: application
    platform: iOS
    sources:
      - ClearHalalApp.swift
      - ContentView.swift
      - Products.storekit
      - Models
      - Services
      - Shared
      - Views
      - Resources
    settings:
      base:
        INFOPLIST_GENERATION_CLASS: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.utkarshkaushik.clearhalal
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_NSCameraUsageDescription: "ClearHalal uses the camera to scan food labels and ingredient lists."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "ClearHalal accesses your photo library when you choose a label photo to check."
    dependencies:
      - package: RevenueCat
        product: RevenueCat
